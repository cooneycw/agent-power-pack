build:
  steps:
    - name: validate-secrets
      image: alpine:3.19
      secrets:
        - deploy_token
      commands:
        - "test -n \"$DEPLOY_TOKEN\" || { echo 'secret DEPLOY_TOKEN not readable'; exit 1; }"
    - name: deploy
      image: alpine:3.19
      secrets:
        - deploy_token
      commands:
        - ./deploy.sh
