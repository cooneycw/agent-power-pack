name: check
family: cicd
description: >-
  Validate the current CI/CD configuration against best practices
  and the woodpecker-checklist rules.
triggers:
  - /cicd:check
  - cicd check
  - validate ci
  - check pipeline
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 20
prompt: |
  # /cicd:check — Validate CI/CD Configuration

  Run the woodpecker-checklist (or equivalent validator) against the
  project's CI/CD configuration file to catch common mistakes.

  ## Arguments

  - `FILE` (optional): path to the CI config file. Auto-detected if
    omitted (checks `.woodpecker.yml`, `.github/workflows/*.yml`).
  - `--json` (optional): output structured JSON results.

  ## Step 1: Locate CI config

  Search for CI configuration files in order:

  1. `.woodpecker.yml` / `.woodpecker/*.yml`
  2. `.github/workflows/*.yml`
  3. `.gitlab-ci.yml`

  If none found, STOP: "No CI configuration found. Run `/cicd:init`."

  ## Step 2: Run validation

  For Woodpecker configs, apply the checklist rules:

  1. **Pinned image tags**: no `:latest` or untagged images.
  2. **safe.directory**: git operations have `safe.directory` configured.
  3. **No unjustified failure:ignore**: every `failure: ignore` must
     have a comment explaining why.
  4. **Stale dependency cache**: cache keys include a hash of the
     lockfile.
  5. **Explicit when filters**: every step has a `when` clause.
  6. **Secrets in first step**: secrets are readable in the first
     pipeline step (Woodpecker requirement).

  For GitHub Actions configs, apply equivalent checks.

  ## Step 3: Report results

  ```
  cicd:check — .woodpecker.yml

    PASS  pinned-image-tags    — all 4 images pinned
    PASS  safe-directory       — configured in git steps
    WARN  stale-dep-cache      — cache key does not include lockfile hash
    PASS  explicit-when        — all 6 steps have when filters

  Summary: 5 passed, 1 warning, 0 failed
  ```

  Exit code: `0` on pass (warnings OK), `1` on any failure.

  ## Step 4: SRE Reasoning (post-validation)

  After running the checklist, apply systemic thinking beyond the rules:

  1. **Pattern recognition**: If you have access to recent pipeline
     failure history (via `/cicd:pipeline --logs`), look for repeated
     failures from the same root cause. Two or more failures from the
     same class = systemic problem, not a one-off bug.

  2. **Implicit contracts**: Identify steps that assume external state
     (package availability, service health, file existence) without
     explicitly validating it. These are ticking time bombs.

  3. **Recommend hardening**: When you spot systemic gaps, suggest:
     - Adding a runtime contract script (validates environment before work)
     - Adding an artifact validation gate (tests artifact before promotion)
     - Adding a canary step (validates on one target before fleet rollout)
     - Replacing implicit checks with explicit sentinel files

  Report any SRE recommendations alongside the checklist results.

  ## Error handling

  - **Config not found**: suggest `/cicd:init`.
  - **Parse error**: report the YAML parse error with line number.
