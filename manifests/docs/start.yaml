name: start
family: docs
description: >-
  Scaffold the docs/theme/ folder structure, print guidance for each
  folder, and propose a Wiki.js convention template with project-isolated
  namespaces. Idempotent — re-running creates only missing pieces.
triggers:
  - /docs:start
  - docs start
  - initialize docs
  - scaffold docs
  - bootstrap docs
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 5
prompt: |
  # /docs:start — Scaffold Theme Folder and Wiki.js Convention

  Initialize the documentation pipeline for the current project. Creates the
  theme folder structure, prints guidance on what to populate, and proposes a
  Wiki.js page convention template.

  ## Arguments

  - `PROJECT_NAME` (optional): project name for Wiki.js namespace isolation.
    If omitted, inferred from the git remote origin or the current directory
    name.

  ## Steps

  ### Step 1: Detect project name

  ```bash
  if [[ -z "$PROJECT_NAME" ]]; then
      PROJECT_NAME=$(basename "$(git remote get-url origin 2>/dev/null \
          | sed 's/.git$//' )" 2>/dev/null \
          || basename "$(git rev-parse --show-toplevel 2>/dev/null)" 2>/dev/null \
          || basename "$(pwd)")
  fi
  echo "Project: $PROJECT_NAME"
  ```

  If detection fails, ask the user for the project name.

  ### Step 2: Create docs/theme/ folder structure

  Create the following directories. Use `mkdir -p` so the operation is
  idempotent — existing directories are left untouched.

  ```bash
  mkdir -p docs/theme/logos
  mkdir -p docs/theme/samples
  mkdir -p docs/theme/fonts
  ```

  For each created directory, add a `.gitkeep` file ONLY if the directory
  is empty (no existing files):

  ```bash
  for dir in docs/theme/logos docs/theme/samples docs/theme/fonts; do
      if [[ -z "$(ls -A "$dir" 2>/dev/null)" ]]; then
          touch "$dir/.gitkeep"
      fi
  done
  ```

  ### Step 3: Print guidance

  Print the following guidance to the user:

  ```
  docs/theme/ scaffold created.

  Populate these folders before running docs:analyze:

    docs/theme/logos/
      Place your project logos here (PNG or SVG).
      These are used in generated slides, diagrams, and Wiki.js pages.
      Tip: include both a full logo and a small icon variant.

    docs/theme/samples/
      Place 1-2 existing slide decks or PDF documents here (PPTX or PDF).
      docs:analyze will infer your visual style — colors, fonts, and layout
      patterns — from these samples.
      Tip: use your most polished or representative deck.

    docs/theme/fonts/
      Place custom font files here (TTF or OTF).
      If your project uses specific brand fonts, include them so generated
      slides and PDFs match your identity.
      Tip: include both regular and bold weights.

  If you have no brand assets yet, that's fine — docs:analyze will use
  sensible defaults and you can refine the theme later.
  ```

  ### Step 4: Propose Wiki.js convention template

  Read the shipped convention template from `docs/wiki-structure.yaml`.

  If `docs/wiki-structure.yaml` does NOT exist, create it from the
  default template shipped with agent-power-pack. The default template
  defines project-isolated namespace paths:

  ```yaml
  project: "{project}"
  paths:
    guides: "{project}/guides"
    architecture: "{project}/architecture"
    api: "{project}/api"
    adrs: "{project}/adrs"
    diagrams: "{project}/diagrams"
    slides: "{project}/slides"
    changelog: "{project}/changelog"
  routing_defaults:
    prose_docs: claude
    api_reference: gpt-4o
    c4_diagrams: gemini
    sequence_diagrams: gemini
    adrs: claude
    slides: gpt-4o
    changelogs: gpt-4o
  ```

  Replace `{project}` with the detected `$PROJECT_NAME`.

  If `docs/wiki-structure.yaml` ALREADY exists, read it and show the
  current configuration without overwriting.

  Present the convention to the user:

  ```
  Wiki.js Convention Template
  ===========================
  Project namespace: {PROJECT_NAME}

  Page paths:
    Guides:          {PROJECT_NAME}/guides/
    Architecture:    {PROJECT_NAME}/architecture/
    API Reference:   {PROJECT_NAME}/api/
    ADRs:            {PROJECT_NAME}/adrs/
    Diagrams:        {PROJECT_NAME}/diagrams/
    Slides:          {PROJECT_NAME}/slides/
    Changelog:       {PROJECT_NAME}/changelog/

  Accept this convention? (yes / customize)
  ```

  - If the user accepts (or does not respond within the flow), proceed
    with the defaults.
  - If the user says "customize", ask which paths to change, update
    `docs/wiki-structure.yaml` accordingly.

  ### Step 5: Record convention in docs/plan.yaml

  If `docs/plan.yaml` does NOT exist, create it with the convention
  metadata:

  ```yaml
  # Documentation plan — generated by docs:start, refined by docs:analyze.
  project: "{PROJECT_NAME}"
  convention: docs/wiki-structure.yaml
  artifacts: []
  ```

  If `docs/plan.yaml` ALREADY exists, do NOT overwrite it. Print:
  "docs/plan.yaml already exists — convention preserved."

  ### Step 6: Summary

  ```
  docs:start complete

    Project:     {PROJECT_NAME}
    Folders:     docs/theme/logos/, docs/theme/samples/, docs/theme/fonts/
    Convention:  docs/wiki-structure.yaml ({accepted | customized})
    Plan:        docs/plan.yaml ({created | already existed})

  Next steps:
    1. Populate docs/theme/ with your brand assets
    2. Run /docs:analyze to infer theme and generate a documentation plan
  ```

  ## Idempotency

  This skill is fully idempotent:
  - `mkdir -p` creates only missing directories.
  - `.gitkeep` files are added only to empty directories.
  - `docs/wiki-structure.yaml` is created only if absent.
  - `docs/plan.yaml` is created only if absent.
  - Re-running is safe and reports the current state.

  ## Error handling

  - **Not in a git repo**: warn but continue (project name falls back to
    directory name).
  - **docs/theme/ partially populated**: create only missing subdirectories,
    do not touch existing files.
  - **Permission error on mkdir**: STOP with the OS error message.
