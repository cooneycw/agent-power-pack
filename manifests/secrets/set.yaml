name: set
family: secrets
description: >-
  Store a secret value in the specified tier of the secrets layer.
triggers:
  - /secrets:set
  - secrets set
  - set secret
  - store secret
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 20
prompt: |
  # /secrets:set — Store a Secret

  Write a secret to the specified tier of the secrets layer.

  ## Arguments

  - `KEY` (required): the secret key name.
  - `VALUE` (required): the secret value. Can be passed interactively
    (prompted) to avoid shell history exposure.
  - `--tier` (optional): target tier — `dotenv` (default), `env-file`,
    `aws`.

  ## Steps

  1. If `VALUE` is not provided as an argument, prompt the user
     interactively (do not echo the input).
  2. Write to the specified tier:
     - **dotenv**: append or update `KEY=VALUE` in `.env`.
       Ensure `.env` is in `.gitignore`.
     - **env-file**: write to the Docker env-file referenced in
       `compose.yaml`.
     - **aws**: call the AWS Secrets Manager API to create or update
       the secret.
  3. Verify the write by reading back via `/secrets:get`.

  ## Output

  ```
  Secret stored: {KEY}

    Tier:      {dotenv | env-file | aws}
    .gitignore: {✓ .env covered | ⚠ .env NOT in .gitignore}
  ```

  ## Security notes

  - NEVER log or echo the secret value.
  - NEVER write secrets to files tracked by git.
  - Always verify `.env` is in `.gitignore` when using the dotenv tier.

  ## Error handling

  - **`.env` not in `.gitignore`**: add it automatically and warn.
  - **AWS sidecar unreachable**: suggest starting it.
  - **Key already exists**: update the existing value (upsert).
