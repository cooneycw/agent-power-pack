name: delete
family: secrets
description: >-
  Remove a secret from the specified tier of the secrets layer.
triggers:
  - /secrets:delete
  - secrets delete
  - delete secret
  - remove secret
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 30
prompt: |
  # /secrets:delete — Remove a Secret

  Delete a secret from a specific tier or all tiers.

  ## Arguments

  - `KEY` (required): the secret key name.
  - `--tier` (optional): tier to delete from — `dotenv`, `env-file`,
    `aws`, or `all`. Default: `all`.
  - `--confirm` (optional): skip confirmation prompt.

  ## Steps

  1. Check which tiers contain the key.
  2. If `--confirm` is not set, ask the user to confirm deletion:
     "Delete '{KEY}' from {tier(s)}? (y/N)"
  3. Delete from the specified tier(s):
     - **dotenv**: remove the line from `.env`.
     - **env-file**: remove from the Docker env-file.
     - **aws**: schedule deletion in AWS Secrets Manager.
  4. Verify the key is no longer accessible.

  ## Output

  ```
  Secret deleted: {KEY}

    dotenv:   removed
    env-file: not found
    aws:      removed (scheduled for deletion)
  ```

  ## Error handling

  - **Key not found**: "Secret '{KEY}' not found in {tier}."
  - **AWS deletion pending**: report the scheduled deletion date.
  - **User cancels**: abort without changes.
