name: rotate
family: secrets
description: >-
  Rotate a secret: generate a new value, update it across tiers,
  and verify dependent services still work.
triggers:
  - /secrets:rotate
  - secrets rotate
  - rotate secret
  - rotate key
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 70
prompt: |
  # /secrets:rotate — Rotate a Secret

  Generate a new value for a secret, update it in the configured
  tier(s), and verify that dependent services still function.

  ## Arguments

  - `KEY` (required): the secret key to rotate.
  - `--generate` (optional): auto-generate a new value. Supported
    types: `token` (32-char hex), `password` (24-char alphanumeric),
    `uuid`. Default: prompt the user for the new value.
  - `--verify` (optional): run a connectivity check after rotation
    (default: true).

  ## Steps

  1. **Read current state**: determine which tier(s) hold the key and
     which services use it (from AGENTS.md and compose.yaml).

  2. **Generate or prompt for new value**:
     - If `--generate=token`: `python -c "import secrets; print(secrets.token_hex(16))"`.
     - If `--generate=password`: `python -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(24)))"`.
     - If `--generate=uuid`: `python -c "import uuid; print(uuid.uuid4())"`.
     - Otherwise: prompt the user interactively.

  3. **Update the secret** in all tiers that held the old value.

  4. **Restart affected services**: if the secret is used by Docker
     Compose services, restart them:
     ```bash
     docker compose restart {affected_services}
     ```

  5. **Verify** (if `--verify`): run connectivity checks for services
     that depend on this key (e.g., Plane probe, Wiki.js probe).

  ## Output

  ```
  Secret rotated: {KEY}

    Tiers updated: dotenv, aws
    Services restarted: mcp
    Verification: ✓ all services healthy

  Old value has been overwritten and is no longer accessible.
  ```

  ## Error handling

  - **Key not found**: "Secret '{KEY}' not found. Nothing to rotate."
  - **Verification fails**: report which service failed and suggest
    rolling back (show the old value is gone — rotation is one-way).
  - **Service restart fails**: report and suggest manual intervention.
