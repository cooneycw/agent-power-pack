name: list
family: secrets
description: >-
  List all secrets across all tiers, showing which tier each key
  lives in (values are always masked).
triggers:
  - /secrets:list
  - secrets list
  - list secrets
  - show secrets
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 40
prompt: |
  # /secrets:list — List All Secrets

  Enumerate all secret keys across all tiers. Values are always
  masked. Shows which tier each key resolves from.

  ## Arguments

  - `--tier` (optional): show keys from a specific tier only.
  - `--json` (optional): output structured JSON.

  ## Steps

  1. **dotenv**: parse `.env` for all `KEY=...` lines.
  2. **env-file**: check Docker env-file if referenced in
     `compose.yaml`.
  3. **aws**: list secrets from AWS Secrets Manager via the sidecar
     (if reachable).
  4. Merge and deduplicate, noting the resolution tier for each key.

  ## Output

  ```
  Secrets inventory:

  | Key                | Tier     | Set       |
  |--------------------|----------|-----------|
  | PLANE_API_TOKEN    | dotenv   | ✓         |
  | PLANE_BASE_URL     | dotenv   | ✓         |
  | WIKIJS_TOKEN       | aws      | ✓         |
  | OPENAI_API_KEY     | env-file | ✓         |
  | ANTHROPIC_API_KEY  | dotenv   | ✓         |

  Total: 5 secrets across 3 tiers
  ```

  ## Error handling

  - **`.env` missing**: skip dotenv tier, note in output.
  - **AWS sidecar unreachable**: skip AWS tier, note in output.
  - **No secrets found**: "No secrets configured. Use `/secrets:set`."
