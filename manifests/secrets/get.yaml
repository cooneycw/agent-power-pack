name: get
family: secrets
description: >-
  Retrieve a secret value from the tiered secrets layer
  (dotenv -> env-file -> AWS Secrets Manager).
triggers:
  - /secrets:get
  - secrets get
  - get secret
  - read secret
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 10
prompt: |
  # /secrets:get — Retrieve a Secret

  Read a secret value from the tiered secrets layer. The tiers are
  checked in order: dotenv (`.env`) -> env-file -> AWS Secrets Manager
  (via the `aws-secretsmanager-agent` sidecar on port 2773).

  ## Arguments

  - `KEY` (required): the secret key name (e.g., `PLANE_API_TOKEN`).
  - `--tier` (optional): force a specific tier — `dotenv`, `env-file`,
    `aws`. If omitted, the tiers are tried in order.
  - `--mask` (optional): mask the value in output (default: true).

  ## Steps

  1. If `--tier` is specified, query only that tier.
  2. Otherwise, check tiers in order:
     a. **dotenv**: read from `.env` file in the project root.
     b. **env-file**: read from the environment (set via Docker
        `env_file` or shell exports).
     c. **aws**: query `http://localhost:2773/secretsmanager/get?secretId={KEY}`.
  3. Return the first tier that has the key.

  ## Output

  ```
  Secret: {KEY}

    Tier:  {dotenv | env-file | aws}
    Value: {value | ****masked****}
  ```

  If `--mask` is false, show the actual value. Default is masked.

  ## Error handling

  - **Key not found in any tier**: "Secret '{KEY}' not found in any
    tier. Use `/secrets:set` to create it."
  - **AWS sidecar unreachable**: "AWS sidecar not running on :2773.
    Run `make mcp-up` or check compose.yaml."
  - **Permission denied**: report the tier and error.
