name: validate
family: secrets
description: >-
  Validate that all required secrets are present and correctly
  configured across tiers.
triggers:
  - /secrets:validate
  - secrets validate
  - check secrets
  - verify secrets
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 60
prompt: |
  # /secrets:validate — Validate Secrets Configuration

  Check that all required secrets are present, all tiers are
  reachable, and `.env` files are properly gitignored.

  ## Arguments

  - `--required` (optional): comma-separated list of required keys.
    If omitted, detect from `.env.example`, `compose.yaml`, and
    AGENTS.md references.

  ## Steps

  1. **Detect required secrets**: parse `.env.example` for declared
     keys. Also check `compose.yaml` for `${VAR}` references and
     AGENTS.md for documented secrets.

  2. **Check each required key**: verify it exists in at least one
     tier.

  3. **Check tier health**:
     - dotenv: `.env` exists and is readable.
     - env-file: Docker env-file exists if referenced.
     - aws: sidecar responds on port 2773.

  4. **Security checks**:
     - `.env` is in `.gitignore`.
     - No secrets appear in tracked files.
     - No secrets in git history (last 10 commits).

  ## Output

  ```
  Secrets Validation

  Required keys:
    ✓ PLANE_API_TOKEN     — found in dotenv
    ✓ PLANE_BASE_URL      — found in dotenv
    ✗ WIKIJS_TOKEN        — NOT FOUND
    ✓ OPENAI_API_KEY      — found in env-file

  Tier health:
    ✓ dotenv     — .env exists, 5 keys
    ✓ env-file   — compose env_file exists
    ✗ aws        — sidecar unreachable on :2773

  Security:
    ✓ .env in .gitignore
    ✓ No secrets in tracked files
    ✓ No secrets in recent git history

  Result: FAIL — 1 missing key, 1 unreachable tier
  ```

  ## Error handling

  - **No `.env.example`**: warn that required keys cannot be
    auto-detected; suggest passing `--required`.
  - **No `.env`**: report all dotenv keys as missing.
