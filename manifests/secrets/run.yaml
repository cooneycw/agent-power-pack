name: run
family: secrets
description: >-
  Run a command with secrets injected as environment variables from
  the tiered secrets layer.
triggers:
  - /secrets:run
  - secrets run
  - run with secrets
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 50
prompt: |
  # /secrets:run — Run Command with Secrets

  Execute a command with all secrets from the tiered layer injected
  as environment variables. Secrets are resolved tier-by-tier and
  passed to the subprocess without touching disk.

  ## Arguments

  - `COMMAND` (required): the command to run (e.g., `make test`).
  - `--tier` (optional): limit secrets to a specific tier.
  - `--keys` (optional): comma-separated list of specific keys to
    inject (default: all).

  ## Steps

  1. Resolve all secrets from the tiered layer (or the specified
     tier/keys).
  2. Build an environment dict with the resolved secrets merged
     into the current environment.
  3. Execute the command in a subprocess with the augmented
     environment.
  4. Stream stdout/stderr to the user.
  5. Report the exit code.

  ## Output

  ```
  Injecting 5 secrets from tiered layer...
  Running: make test

  {command output}

  Exit code: 0
  ```

  ## Security notes

  - Secrets are passed via the process environment, never written to
    disk or logged.
  - The subprocess inherits secrets only for its lifetime.
  - NEVER echo resolved secret values.

  ## Error handling

  - **No secrets found**: warn and run the command without injection.
  - **Command fails**: report exit code and stderr.
  - **Tier unreachable**: skip that tier, warn, continue.
