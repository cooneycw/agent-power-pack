name: ui
family: secrets
description: >-
  Interactive secrets manager: guided menu for viewing, setting,
  rotating, and validating secrets.
triggers:
  - /secrets:ui
  - secrets ui
  - secrets menu
  - manage secrets
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 80
prompt: |
  # /secrets:ui — Interactive Secrets Manager

  Present a guided, interactive menu for managing secrets. Combines
  all secrets operations into a single conversational interface.

  ## Arguments

  None. This is a fully interactive skill.

  ## Flow

  1. **Show current state**: run `/secrets:list` and `/secrets:validate`
     to display the current secrets inventory and any issues.

  2. **Present options**:

     ```
     Secrets Manager

     Current: 5 secrets across 2 tiers (1 missing, 1 tier unreachable)

     What would you like to do?

       1. View secrets list
       2. Get a specific secret
       3. Set a new secret
       4. Delete a secret
       5. Rotate a secret
       6. Validate configuration
       7. Run command with secrets
       8. Exit
     ```

  3. **Execute the chosen action**: delegate to the appropriate
     `/secrets:*` skill.

  4. **Loop**: after each action, return to the menu until the user
     chooses Exit.

  ## Notes

  - This is a convenience wrapper — every action is available as a
    standalone skill.
  - The menu adapts: if validation finds issues, they appear
    prominently at the top.
  - For non-interactive use, call the individual skills directly.
