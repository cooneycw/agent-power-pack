# manifests/flow/status.yaml
#
# Adapted from claude-power-pack .claude/commands/flow/status.md.
# Substitutions per agent-power-pack Constitution:
#   - Issue title fetch uses the active backend (Plane via plane-mcp
#     or GitHub via gh CLI).

name: status
family: flow
description: >-
  Show all active worktrees with their linked issue, branch, dirty
  state, unpushed commits, and open PR status. Quick per-day glance at
  in-flight work.
triggers:
  - /flow:status
  - flow status
  - show worktrees
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools:
  - server: plane
    tool: list_issues
attribution: null
order: 90
prompt: |
  # /flow:status — Active Worktrees + Issue + PR State

  Show a one-glance status of every in-flight worktree: linked issue,
  branch, dirty state, unpushed commits, and open PR.

  ## Step 0: Detect backend

  Same as `/flow:start`: Plane-first, GitHub fallback. Record the
  backend for issue-title fetching in Step 4.

  ## Step 1: Detect repository

  ```bash
  REPO=$(basename "$(git rev-parse --show-toplevel)")
  ```

  ## Step 2: List worktrees

  ```bash
  git worktree list
  ```

  If only the main repo exists, report "No active worktrees. Run
  `/flow:start <issue>` to begin." and stop.

  ## Step 3: Per-worktree state

  For each worktree (skip the main repo entry):

  ```bash
  BRANCH=$(git -C "$WORKTREE_PATH" branch --show-current 2>/dev/null)
  ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K[0-9]+' || echo "")

  DIRTY=$(git -C "$WORKTREE_PATH" status --porcelain 2>/dev/null | wc -l)
  UNPUSHED=$(git -C "$WORKTREE_PATH" rev-list --count origin/main..HEAD 2>/dev/null || echo "0")

  if [[ -n "$BRANCH" ]]; then
      PR_INFO=$(gh pr list --head "$BRANCH" --json number,url,state --jq '.[0]' 2>/dev/null || echo "")
  fi
  ```

  ## Step 4: Fetch issue titles

  For each detected `ISSUE_NUM`:

  - **Plane**: call `plane.list_issues` filtered by the ID and extract
    `title`.
  - **GitHub**: `gh issue view "$ISSUE_NUM" --json title --jq '.title'`.

  Fall back to "(title unavailable)" if the call fails — do NOT block
  the status report on a backend issue.

  ## Step 5: Output

  ```markdown
  ## Flow Status — {repo}

  | Worktree | Issue | Branch | Status | PR |
  |----------|-------|--------|--------|----|
  | ../{repo}-issue-42 | #42 {title} | issue-42-{slug} | 3 dirty, 2 unpushed | — |
  | ../{repo}-issue-55 | #55 {title} | issue-55-{slug} | clean | PR #78 (OPEN) |

  ### Suggestions

  - **#42**: uncommitted work — commit or stash before switching.
  - **#55**: PR open — check reviews, then `/flow:merge`.
  ```

  ## Step 6: Detect stale branches

  ```bash
  WORKTREE_BRANCHES=$(git worktree list --porcelain \
    | grep "^branch " | sed 's|branch refs/heads/||')

  STALE_COUNT=0
  for branch in $(git branch | grep 'issue-' | sed 's/^[ *]*//'); do
      echo "$WORKTREE_BRANCHES" | grep -q "^${branch}$" && continue
      STALE_COUNT=$((STALE_COUNT + 1))
  done

  PRUNABLE=$(git worktree list --porcelain | grep -c "prunable" || echo "0")
  ```

  If `STALE_COUNT > 0` or `PRUNABLE > 0`, append:

  ```markdown
  ### Cleanup available

  - {N} local issue branches with no active worktree
  - {M} stale worktree references

  Run `/flow:cleanup` to remove them.
  ```

  ## Notes

  - Worktrees on `main` or non-issue branches are listed but marked as
    "(not issue-linked)".
  - Output stays concise — this is a glance, not a dashboard.
  - Never modifies anything.
