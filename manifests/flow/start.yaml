# manifests/flow/start.yaml
#
# Adapted from claude-power-pack .claude/commands/flow/start.md.
# Substitutions per agent-power-pack Constitution:
#   - Plane (via plane-mcp) is the primary issue backend; gh CLI is the
#     fallback when plane-mcp is unreachable (spec FR-010).
#   - Added MANDATORY verification gate carried over from flow:auto Step 1
#     (the gate was only implicit in the source; we make it explicit).

name: start
family: flow
description: >-
  Create a worktree and branch for a single issue. Stateless — all context
  comes from git and the active issue backend (Plane or GitHub). First step
  of the issue-driven development loop.
triggers:
  - /flow:start
  - flow start
  - start issue
  - pick up issue
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools:
  - server: plane
    tool: list_issues
  - server: plane
    tool: list_workspaces
attribution: null
order: 20
prompt: |
  # /flow:start — Create Worktree for an Issue

  Take an issue number and land the user in a correctly-branched worktree
  ready for implementation. Idempotent: running it twice on the same issue
  picks up the existing worktree without error.

  ## Arguments

  - `ISSUE` (required): issue number, e.g. `42`.

  ## Step 0: Detect issue backend

  Before fetching anything, determine the backend:

  1. If `plane-mcp` responds to `list_workspaces` without error AND
     `AGENTS.md` has an `External Systems` section naming a Plane
     workspace, use **Plane**. Call `plane.list_issues` filtered by ID
     to fetch the target issue.
  2. Otherwise, fall back to **GitHub Issues** via `gh issue view`.
  3. If neither backend is available, STOP with: "No issue backend
     configured. Run `agent-power-pack init --reconfigure plane` or make
     sure the `gh` CLI is authenticated."

  Record the chosen backend for all subsequent steps.

  ## Step 1: Validate prerequisites

  ```bash
  git rev-parse --show-toplevel  # ensure we're in a git repo
  ```

  For the **GitHub** backend only, also run `gh auth status`.

  ## Step 2: Fetch issue details

  - **Plane**: call `plane.list_issues` or the dedicated `get_issue`
    tool (when implemented) and extract `title`, `state`, `body`.
  - **GitHub**: `gh issue view "$ISSUE" --json number,title,state,body`.

  If the issue is not OPEN, warn the user and ask whether to proceed.
  Extract `TITLE` for branch naming.

  ## Step 3: Derive branch and worktree names

  ```bash
  ISSUE_NUM="$1"
  REPO=$(basename "$(git rev-parse --show-toplevel)")

  SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
      | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
      | sed 's/^-//;s/-$//' | cut -c1-50)
  BRANCH="issue-${ISSUE_NUM}-${SLUG}"
  WORKTREE_DIR="../${REPO}-issue-${ISSUE_NUM}"
  ```

  ## Step 4: Check for existing work

  ```bash
  git worktree list | grep "issue-${ISSUE_NUM}"
  git fetch origin
  git branch -r | grep "issue-${ISSUE_NUM}-"
  ```

  Handle each state:

  - **Worktree exists**: inform user of the path. Do not recreate.
    `cd` into the existing worktree.
  - **Remote branch exists (no local worktree)**: create a worktree
    tracking the remote branch, then `cd` into it.
    ```bash
    REMOTE_BRANCH=$(git branch -r | grep "issue-${ISSUE_NUM}-" | head -1 | xargs)
    LOCAL_BRANCH="${REMOTE_BRANCH#origin/}"
    git worktree add -b "$LOCAL_BRANCH" "$WORKTREE_DIR" "$REMOTE_BRANCH"
    cd "$WORKTREE_DIR"
    ```
  - **Neither exists**: create fresh from `origin/main`.
    ```bash
    git fetch origin main
    git worktree add -b "$BRANCH" "$WORKTREE_DIR" origin/main
    cd "$WORKTREE_DIR"
    ```

  ## Step 5: Verification gate (MANDATORY — do NOT skip)

  Before reporting success, verify the CWD is NOT on main/master:

  ```bash
  CURRENT_BRANCH=$(git branch --show-current)
  if [[ "$CURRENT_BRANCH" == "main" || "$CURRENT_BRANCH" == "master" ]]; then
      echo "ERROR: still on $CURRENT_BRANCH after Step 4."
      echo "STOP: worktree creation or cd failed. Do NOT proceed."
      exit 1
  fi
  echo "Verified: on branch '$CURRENT_BRANCH' in $(pwd)"
  ```

  If this verification fails, STOP and surface the error.

  ## Step 6: Report

  ```
  Created worktree for issue #{ISSUE}: "{title}"

    Backend:   {Plane | GitHub}
    Directory: {WORKTREE_DIR}
    Branch:    {BRANCH}
    Verified:  CWD is the worktree (not main)
  ```

  ## Error handling

  - **Issue not found**: report "Issue #{N} not found on {backend}".
  - **Issue closed**: warn but allow proceed.
  - **Worktree exists**: report existing path, do not error.
  - **Branch name collision**: append a short hash and retry.
  - **Not in a git repo**: report error clearly.
  - **Verification gate fails**: STOP, do not proceed.

  ## Idempotency

  Running `/flow:start 42` twice MUST detect the existing worktree and
  report its path without error or duplication.
