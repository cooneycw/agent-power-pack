# manifests/flow/cleanup.yaml
#
# Adapted from claude-power-pack .claude/commands/flow/cleanup.md
# with minimal substitutions — worktree/branch cleanup is generic.

name: cleanup
family: flow
description: >-
  Prune stale worktree references, delete local branches already merged
  or whose remote was deleted, and prune stale remote-tracking
  branches. Safe to run repeatedly; read-only except for the prune
  operations.
triggers:
  - /flow:cleanup
  - flow cleanup
  - prune worktrees
runtimes:
  - claude-code
  - codex-cli
  - gemini-cli
  - cursor
mcp_tools: []
attribution: null
order: 80
prompt: |
  # /flow:cleanup — Prune Stale Worktrees and Branches

  Remove orphaned worktree references, delete local branches that are
  already merged or whose remote counterpart was deleted, and prune
  stale remote-tracking branches. Idempotent.

  ## Step 1: Detect repo root

  ```bash
  if [[ -f ".git" ]]; then
      MAIN_REPO=$(cat .git | sed 's/gitdir: //' | sed 's|/.git/worktrees/.*||')
  else
      MAIN_REPO=$(git rev-parse --show-toplevel)
  fi
  REPO=$(basename "$MAIN_REPO")
  ```

  ## Step 2: Prune stale worktree references

  ```bash
  STALE_WORKTREES=$(git -C "$MAIN_REPO" worktree list --porcelain \
    | grep -B2 "prunable" | grep "worktree " | sed 's/worktree //' || true)

  git -C "$MAIN_REPO" worktree prune
  ```

  Report what was pruned (or "No stale worktree references found").

  ## Step 3: Delete merged local branches

  Protect `main`, `master`, and any branch with an active worktree.

  ```bash
  WORKTREE_BRANCHES=$(git -C "$MAIN_REPO" worktree list --porcelain \
    | grep "^branch " | sed 's|branch refs/heads/||')

  git -C "$MAIN_REPO" fetch origin main

  MERGED=$(git -C "$MAIN_REPO" branch --merged main \
    | grep -v '^\*' | grep -v 'main$' | grep -v 'master$' \
    | sed 's/^[ ]*//')
  ```

  For each merged branch:
  1. Skip if it has an active worktree.
  2. Otherwise `git -C "$MAIN_REPO" branch -d "$branch"`.

  ## Step 4: Detect squash-merged branches (remote deleted)

  Squash-merges don't register as `--merged`, so also find local
  `issue-*` branches whose remote tracking ref is gone:

  ```bash
  for branch in $(git -C "$MAIN_REPO" branch | grep 'issue-' | sed 's/^[ *]*//'); do
      echo "$WORKTREE_BRANCHES" | grep -q "^${branch}$" && continue

      REMOTE=$(git -C "$MAIN_REPO" config "branch.${branch}.remote" 2>/dev/null || echo "")
      MERGE_REF=$(git -C "$MAIN_REPO" config "branch.${branch}.merge" 2>/dev/null || echo "")

      if [[ -n "$REMOTE" && -n "$MERGE_REF" ]]; then
          REMOTE_REF="refs/remotes/${REMOTE}/$(echo "$MERGE_REF" | sed 's|refs/heads/||')"
          if ! git -C "$MAIN_REPO" show-ref --verify --quiet "$REMOTE_REF" 2>/dev/null; then
              # Remote deleted → safe to force-delete locally
              git -C "$MAIN_REPO" branch -D "$branch" \
                && echo "Deleted (remote gone): $branch"
          fi
      fi
  done
  ```

  Use `git branch -D` (force) for this path because squash-merged
  branches don't register as fully merged.

  ## Step 5: Prune stale remote-tracking branches

  ```bash
  git -C "$MAIN_REPO" fetch --prune
  ```

  Removes `remotes/origin/issue-*` for branches already deleted on the
  remote.

  ## Step 6: Report

  ```markdown
  ## Flow Cleanup — {repo}

  ### Worktree references
    {N} stale references pruned (or "None found")

  ### Local branches deleted
    {branch-1} (merged to main)
    {branch-2} (remote branch deleted — squash-merged PR)
    ... or "No stale branches found"

  ### Remote tracking branches
    {N} stale refs pruned (or "Already clean")

  ### Current state
    {M} worktrees active
    {N} local issue branches remaining
  ```

  ## Error handling

  - **Not a git repo**: report error and exit.
  - **Uncommitted changes on a branch**: never delete; skip and warn.
  - **Protected branches**: never delete `main` or `master`.
  - **Active worktree branches**: never delete branches with active worktrees.

  ## Notes

  - Safe to run multiple times (fully idempotent).
  - Only force-deletes `issue-*` branches in Step 4. Other branches
    require a normal `--merged` confirmation.
  - Runs automatically at the end of `/flow:merge`.
  - No network access beyond `git fetch --prune`.
