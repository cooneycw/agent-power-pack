  ### Actions needed

  1. Any FAIL or WARN gets a numbered, actionable fix suggestion here.
  ```

  ## Status symbols

  - ✅ PASS
  - ⚠️  WARN (optional or not-yet-available)
  - ❌ FAIL (required and missing)

  ## Notes

  - Read-only; never modifies anything.
  - Skills not installed in `~/.claude/skills/` is a WARN, not a FAIL —
    they're per-user and optional. The *vendored* copy under
    `vendor/skills/` is the authoritative source.
  - `agent-power-pack` CLI not on PATH is a WARN in early dogfooding
    (before T026 lands) but becomes a FAIL after v0.1.0 release.
  - The MCP container section requires `make mcp-up` to have been run.
    If all 12 ports are unreachable, the most common fix is
    `make mcp-up`.
