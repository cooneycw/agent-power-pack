lint:
  steps:
    - name: lint
      image: ghcr.io/astral-sh/uv:0.7.3-python3.11-bookworm
      commands:
        - uv sync --frozen --group dev
        - uv run ruff check .

test:
  steps:
    - name: test
      image: ghcr.io/astral-sh/uv:0.7.3-python3.11-bookworm
      depends_on:
        - lint
      commands:
        - uv sync --frozen --group dev
        - uv run pytest -m "unit or integration"

verify:
  steps:
    - name: verify
      image: ghcr.io/astral-sh/uv:0.7.3-python3.11-bookworm
      depends_on:
        - test
      commands:
        - uv sync --frozen --group dev
        - uv run agent-power-pack cicd woodpecker-checklist --file .woodpecker.yml --json
        - uv run ruff check .
        - uv run mypy src tests
        - uv run pytest -m perf

staging-deploy:
  concurrency: foundation-staging
  labels:
    env: staging
    tier: privileged
  steps:
    - name: deploy-staging
      image: alpine:3.19
      depends_on:
        - verify
      when:
        event:
          - pull_request
          - manual
      commands:
        - apk add --no-cache curl git
        - git config --global safe.directory /woodpecker/src
        - git fetch origin main
        - echo "deploy staging"
        - sleep 5
        - curl -fsS http://staging.example.internal/healthz

production-deploy:
  concurrency: foundation-production
  labels:
    env: production
    tier: privileged
  steps:
    - name: deploy-production
      image: alpine:3.19
      depends_on:
        - staging-deploy
      when:
        branch:
          - main
        event:
          - push
          - manual
      commands:
        - apk add --no-cache curl git
        - git config --global safe.directory /woodpecker/src
        - git fetch origin main
        - echo "deploy production"
        - sleep 10
        - curl -fsS http://production.example.internal/healthz
